name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
            artifact: MultiStreamVlc-win-x64
            ext: zip
          - rid: linux-x64
            os: ubuntu-latest
            artifact: MultiStreamVlc-linux-x64
            ext: tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - run: dotnet publish MultiStreamVlc.csproj -c Release -r ${{ matrix.rid }} -p:PublishSingleFile=true -p:SelfContained=true -p:IncludeNativeLibrariesForSelfExtract=true -p:PublishTrimmed=false -o publish

      - name: Package (Windows)
        if: matrix.rid == 'win-x64'
        run: Compress-Archive -Path publish/* -DestinationPath ${{ matrix.artifact }}.zip
        shell: pwsh

      - name: Package (Linux)
        if: matrix.rid == 'linux-x64'
        run: tar -czf ${{ matrix.artifact }}.tar.gz -C publish .
        shell: bash

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: artifacts/**/*
