<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <header>
        <div class="header-left">
            <span class="header-title">History</span>
            <span class="status-dot" id="status-dot"></span>
            <span class="status-text" id="status-endpoint"></span>
        </div>
        <div class="header-right">
            <button class="btn-icon" id="btn-settings" title="Settings">⚙</button>
            <button class="btn-icon" id="btn-refresh" title="Refresh">↻</button>
            <button class="btn-icon btn-danger" id="btn-clear-all" title="Clear all">✕</button>
        </div>
    </header>
    <div id="status"></div>
    <div id="list"></div>
    <script src="popup.js"></script>
</body>
</html>
