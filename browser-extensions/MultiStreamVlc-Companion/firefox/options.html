<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MultiStreamVlc Companion — Settings</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            padding: 32px;
            max-width: 480px;
            margin: 0 auto;
        }
        h1 {
            font-size: 20px;
            margin-bottom: 24px;
            color: #fff;
        }
        .field {
            margin-bottom: 16px;
        }
        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 4px;
            color: #aaa;
        }
        input {
            width: 100%;
            padding: 8px 12px;
            font-size: 14px;
            border: 1px solid #333;
            border-radius: 6px;
            background: #16213e;
            color: #fff;
            outline: none;
        }
        input:focus {
            border-color: #0f8;
        }
        .preview {
            font-size: 13px;
            color: #888;
            margin-top: 6px;
            font-family: monospace;
        }
        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 24px;
        }
        button {
            padding: 8px 20px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: opacity 0.15s;
        }
        button:hover { opacity: 0.85; }
        .btn-save {
            background: #0f8;
            color: #000;
        }
        .btn-test {
            background: #335;
            color: #fff;
        }
        .btn-test:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        #status {
            margin-top: 16px;
            font-size: 13px;
            min-height: 20px;
        }
        .status-ok { color: #0f8; }
        .status-err { color: #f44; }
        .status-info { color: #4af; }
    </style>
</head>
<body>
    <h1>Companion Listener Settings</h1>

    <div class="field">
        <label for="host">Host</label>
        <input type="text" id="host" placeholder="localhost">
    </div>

    <div class="field">
        <label for="port">Port</label>
        <input type="number" id="port" min="1" max="65535" placeholder="55432">
    </div>

    <div class="preview">
        Endpoint: <span id="endpoint-preview">http://localhost:55432/</span>
    </div>

    <div class="buttons">
        <button class="btn-test" id="btn-test">Test Connection</button>
        <button class="btn-save" id="btn-save">Save</button>
    </div>

    <div id="status"></div>

    <script src="options.js"></script>
</body>
</html>
